<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatStream — Real-Time Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --surface: #161a23;
      --surface2: #1e2330;
      --border: #2a3045;
      --accent: #6c63ff;
      --accent2: #a78bfa;
      --text: #e2e8f0;
      --text-muted: #8892aa;
      --green: #34d399;
      --red: #f87171;
      --radius: 12px;
      --sidebar: 260px;
    }

    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

    /* ── Auth Screen ───────────────────────── */
    #auth-screen {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; align-items: center; justify-content: center; z-index: 100;
    }
    .auth-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 48px 40px; width: 420px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.5);
      animation: fadeUp .4s ease;
    }
    .auth-logo { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .auth-logo span { color: var(--accent); }
    .auth-subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 32px; }

    .tab-bar { display: flex; gap: 4px; background: var(--bg); border-radius: 10px; padding: 4px; margin-bottom: 28px; }
    .tab-btn {
      flex: 1; padding: 10px; border: none; background: transparent;
      color: var(--text-muted); cursor: pointer; border-radius: 8px;
      font-family: inherit; font-size: 14px; font-weight: 500; transition: all .2s;
    }
    .tab-btn.active { background: var(--accent); color: #fff; }

    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 6px; font-weight: 500; }
    .form-group input {
      width: 100%; padding: 12px 16px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); font-family: inherit; font-size: 14px;
      transition: border-color .2s; outline: none;
    }
    .form-group input:focus { border-color: var(--accent); }

    .btn-primary {
      width: 100%; padding: 13px; background: var(--accent); border: none;
      border-radius: 10px; color: #fff; font-family: inherit; font-size: 15px;
      font-weight: 600; cursor: pointer; transition: opacity .2s, transform .1s;
      margin-top: 8px;
    }
    .btn-primary:hover { opacity: .9; }
    .btn-primary:active { transform: scale(.98); }

    .auth-msg { font-size: 13px; margin-top: 12px; min-height: 20px; text-align: center; }
    .auth-msg.error { color: var(--red); }
    .auth-msg.success { color: var(--green); }

    /* ── App Layout ─────────────────────────── */
    #app { display: none; width: 100%; }

    /* Sidebar */
    .sidebar {
      width: var(--sidebar); background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; flex-shrink: 0;
    }
    .sidebar-header {
      padding: 20px 16px 16px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .app-brand { font-size: 18px; font-weight: 700; }
    .app-brand span { color: var(--accent); }

    .user-badge {
      padding: 12px 16px; background: var(--surface2); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px; font-size: 13px;
    }
    .avatar {
      width: 32px; height: 32px; border-radius: 50%; background: var(--accent);
      display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; flex-shrink: 0;
    }
    .user-name { font-weight: 600; }
    .user-status { color: var(--text-muted); font-size: 11px; }

    .rooms-section { flex: 1; overflow-y: auto; padding: 12px 0; }
    .section-label { padding: 8px 16px; font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .08em; }

    .room-item {
      padding: 10px 16px; cursor: pointer; display: flex; align-items: center; gap: 10px;
      border-radius: 8px; margin: 2px 8px; transition: background .15s;
    }
    .room-item:hover { background: var(--surface2); }
    .room-item.active { background: rgba(108,99,255,.15); }
    .room-item.active .room-name { color: var(--accent2); }
    .room-hash { color: var(--text-muted); font-size: 18px; }
    .room-name { font-size: 14px; font-weight: 500; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .new-room-btn {
      margin: 8px; padding: 10px 14px; background: transparent;
      border: 1px dashed var(--border); border-radius: 10px; color: var(--text-muted);
      cursor: pointer; font-family: inherit; font-size: 13px; text-align: left;
      transition: border-color .2s, color .2s;
    }
    .new-room-btn:hover { border-color: var(--accent); color: var(--accent); }

    .logout-btn {
      margin: 8px; padding: 10px 14px; background: transparent;
      border: 1px solid var(--border); border-radius: 10px; color: var(--text-muted);
      cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 500; text-align: left;
      transition: all .2s;
    }
    .logout-btn:hover { border-color: var(--red); color: var(--red); }

    /* Main Chat Area */
    .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    .chat-header {
      padding: 16px 24px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px; background: var(--surface);
    }
    .chat-room-name { font-size: 17px; font-weight: 600; }
    .chat-room-desc { font-size: 13px; color: var(--text-muted); margin-left: auto; }
    .connection-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
    .connection-dot.offline { background: var(--red); }

    .messages-container { flex: 1; overflow-y: auto; padding: 16px 24px; display: flex; flex-direction: column; gap: 2px; }

    .date-separator {
      text-align: center; font-size: 12px; color: var(--text-muted);
      margin: 12px 0; position: relative;
    }
    .date-separator::before {
      content: ''; position: absolute; top: 50%; left: 0; right: 0;
      height: 1px; background: var(--border); transform: translateY(-50%);
    }
    .date-separator span { background: var(--bg); padding: 0 12px; position: relative; }

    .msg-group { display: flex; gap: 12px; padding: 6px 0; animation: fadeIn .2s ease; }
    .msg-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--accent); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; margin-top: 2px; }
    .msg-body { flex: 1; }
    .msg-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 2px; }
    .msg-sender { font-size: 14px; font-weight: 600; }
    .msg-time { font-size: 11px; color: var(--text-muted); }
    .msg-content { font-size: 14px; line-height: 1.6; color: #c8d3e8; word-break: break-word; }

    .msg-content.system { font-style: italic; color: var(--text-muted); font-size: 13px; }

    .empty-state {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; color: var(--text-muted);
    }
    .empty-icon { font-size: 48px; }

    .no-room { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 12px; color: var(--text-muted); }

    /* Message input */
    .input-area { padding: 16px 24px; border-top: 1px solid var(--border); background: var(--surface); }
    .input-row {
      display: flex; gap: 10px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 12px; padding: 4px 4px 4px 16px;
      transition: border-color .2s;
    }
    .input-row:focus-within { border-color: var(--accent); }
    #msg-input {
      flex: 1; background: transparent; border: none; color: var(--text);
      font-family: inherit; font-size: 14px; outline: none; padding: 8px 0; resize: none;
    }
    #msg-input::placeholder { color: var(--text-muted); }
    #send-btn {
      padding: 10px 20px; background: var(--accent); border: none; border-radius: 8px;
      color: #fff; cursor: pointer; font-family: inherit; font-size: 14px; font-weight: 600;
      transition: opacity .2s; align-self: flex-end; margin: 4px;
    }
    #send-btn:hover { opacity: .85; }
    #send-btn:disabled { opacity: .4; cursor: default; }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.7); display: none;
      align-items: center; justify-content: center; z-index: 200;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
      padding: 32px; width: 380px; animation: fadeUp .25s ease;
    }
    .modal h3 { font-size: 18px; margin-bottom: 20px; }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .btn-secondary {
      flex: 1; padding: 11px; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-family: inherit; font-size: 14px; cursor: pointer;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #3a4560; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>

<!-- Auth Screen -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">Chat<span>Stream</span></div>
    <div class="auth-subtitle">Real-time conversations, simplified.</div>

    <div class="tab-bar">
      <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Login</button>
      <button class="tab-btn" id="tab-register" onclick="switchTab('register')">Register</button>
    </div>

    <div id="form-login">
      <div class="form-group"><label>Username</label><input id="login-username" type="text" placeholder="Enter your username" /></div>
      <div class="form-group"><label>Password</label><input id="login-password" type="password" placeholder="Enter your password" /></div>
      <button class="btn-primary" onclick="doLogin()">Sign In</button>
    </div>

    <div id="form-register" style="display:none">
      <div class="form-group"><label>Username</label><input id="reg-username" type="text" placeholder="Choose a username" /></div>
      <div class="form-group"><label>Password</label><input id="reg-password" type="password" placeholder="Choose a password" /></div>
      <button class="btn-primary" onclick="doRegister()">Create Account</button>
    </div>

    <div class="auth-msg" id="auth-msg"></div>
  </div>
</div>

<!-- Main App -->
<div id="app">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="app-brand">Chat<span>Stream</span></div>
    </div>
    <div class="user-badge">
      <div class="avatar" id="user-avatar">?</div>
      <div>
        <div class="user-name" id="user-display-name">...</div>
        <div class="user-status">● Online</div>
      </div>
    </div>
    <div class="rooms-section">
      <div class="section-label">Rooms</div>
      <div id="room-list"></div>
    </div>
    <button class="new-room-btn" onclick="openNewRoomModal()">+ New Room</button>
    <button class="logout-btn" onclick="logout()">Sign Out</button>
  </aside>

  <main class="chat-area">
    <div id="no-room-placeholder" class="no-room">
      <div style="font-size:48px">💬</div>
      <div style="font-weight:600; font-size:18px;">Pick a room to chat</div>
      <div style="font-size:14px; color:var(--text-muted)">Select a room from the sidebar or create a new one.</div>
    </div>

    <div id="chat-main" style="display:none; display:flex; flex-direction:column; height:100%">
      <div class="chat-header">
        <div style="color:var(--text-muted); font-size:18px">#</div>
        <div class="chat-room-name" id="chat-room-name">general</div>
        <div class="chat-room-desc" id="chat-room-desc"></div>
        <div class="connection-dot" id="conn-dot"></div>
      </div>
      <div class="messages-container" id="messages"></div>
      <div class="input-area">
        <div class="input-row">
          <textarea id="msg-input" rows="1" placeholder="Message #general" onkeydown="handleKey(event)"></textarea>
          <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- New Room Modal -->
<div class="modal-overlay" id="new-room-modal">
  <div class="modal">
    <h3>Create a Room</h3>
    <div class="form-group"><label>Room Name</label><input id="new-room-name" type="text" placeholder="e.g. general" /></div>
    <div class="form-group"><label>Description (optional)</label><input id="new-room-desc-input" type="text" placeholder="What's this room about?" /></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeNewRoomModal()">Cancel</button>
      <button class="btn-primary" style="flex:1" onclick="createRoom()">Create</button>
    </div>
  </div>
</div>

<script>
  // ── State ──────────────────────────────────────────────────────────────
  const BASE = '';
  let token = localStorage.getItem('chat_token');
  let currentUser = JSON.parse(localStorage.getItem('chat_user') || 'null');
  let connection = null;
  let currentRoom = null;
  let rooms = [];

  // ── Boot ──────────────────────────────────────────────────────────────
  if (token && currentUser) showApp();

  // ── Auth ──────────────────────────────────────────────────────────────
  function switchTab(tab) {
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
    document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('form-register').style.display = tab === 'register' ? 'block' : 'none';
    setAuthMsg('', '');
  }

  function setAuthMsg(msg, type) {
    const el = document.getElementById('auth-msg');
    el.textContent = msg;
    el.className = 'auth-msg ' + type;
  }

  async function doRegister() {
    const username = document.getElementById('reg-username').value.trim();
    const password = document.getElementById('reg-password').value;
    if (!username || !password) return setAuthMsg('Please fill in all fields.', 'error');
    try {
      const res = await fetch(`${BASE}/api/auth/register`, {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ username, password })
      });
      if (res.ok) {
        setAuthMsg('Account created! You can now log in.', 'success');
        switchTab('login');
        document.getElementById('login-username').value = username;
      } else {
        const txt = await res.text();
        setAuthMsg(txt || 'Registration failed.', 'error');
      }
    } catch { setAuthMsg('Network error. Is the server running?', 'error'); }
  }

  async function doLogin() {
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;
    if (!username || !password) return setAuthMsg('Please fill in all fields.', 'error');
    try {
      const res = await fetch(`${BASE}/api/auth/login`, {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ username, password })
      });
      if (res.ok) {
        const data = await res.json();
        token = data.token;
        currentUser = { id: data.userId, username: data.username };
        localStorage.setItem('chat_token', token);
        localStorage.setItem('chat_user', JSON.stringify(currentUser));
        showApp();
      } else {
        const txt = await res.text();
        setAuthMsg(txt || 'Login failed.', 'error');
      }
    } catch { setAuthMsg('Network error. Is the server running?', 'error'); }
  }

  function logout() {
    if (connection) connection.stop();
    token = null; currentUser = null; currentRoom = null;
    localStorage.removeItem('chat_token');
    localStorage.removeItem('chat_user');
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }

  // ── App Init ─────────────────────────────────────────────────────────
  async function showApp() {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('user-display-name').textContent = currentUser.username;
    document.getElementById('user-avatar').textContent = currentUser.username[0].toUpperCase();
    await loadRooms();
    await initSignalR();
  }

  // ── Rooms ─────────────────────────────────────────────────────────────
  async function loadRooms() {
    try {
      const res = await fetch(`${BASE}/api/rooms`, { headers: { Authorization: 'Bearer ' + token } });
      if (res.ok) { rooms = await res.json(); renderRoomList(); }
    } catch { console.error('Failed to load rooms'); }
  }

  function renderRoomList() {
    const list = document.getElementById('room-list');
    list.innerHTML = rooms.map(r => `
      <div class="room-item ${currentRoom?.id === r.id ? 'active' : ''}" onclick="joinRoom(${r.id})">
        <span class="room-hash">#</span>
        <span class="room-name">${r.name}</span>
      </div>`).join('');
  }

  async function joinRoom(roomId) {
    const room = rooms.find(r => r.id === roomId);
    if (!room) return;

    // Leave previous room
    if (currentRoom && connection) {
      await connection.invoke('LeaveRoom', currentRoom.id).catch(() => {});
    }

    currentRoom = room;
    renderRoomList();
    document.getElementById('no-room-placeholder').style.display = 'none';
    document.getElementById('chat-main').style.display = 'flex';
    document.getElementById('chat-room-name').textContent = room.name;
    document.getElementById('chat-room-desc').textContent = room.description || '';
    document.getElementById('msg-input').placeholder = `Message #${room.name}`;
    document.getElementById('messages').innerHTML = '';

    // Join SignalR group
    if (connection?.state === 'Connected') {
      await connection.invoke('JoinRoom', room.id).catch(console.error);
    }
    // Load history
    await loadMessages(room.id);
  }

  async function loadMessages(roomId) {
    try {
      const res = await fetch(`${BASE}/api/rooms/${roomId}/messages`, { headers: { Authorization: 'Bearer ' + token } });
      if (res.ok) {
        const msgs = await res.json();
        const container = document.getElementById('messages');
        container.innerHTML = '';
        if (msgs.length === 0) {
          container.innerHTML = '<div class="empty-state"><div class="empty-icon">✨</div><div>Be the first to say something!</div></div>';
        } else {
          msgs.forEach(m => appendMessage(m, false));
        }
        scrollToBottom();
      }
    } catch { console.error('Failed to load messages'); }
  }

  function appendMessage(msg, scroll = true) {
    const container = document.getElementById('messages');
    // Remove empty state
    const empty = container.querySelector('.empty-state');
    if (empty) empty.remove();

    const time = new Date(msg.sentAt).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    const initials = msg.senderUsername[0].toUpperCase();
    const color = stringToColor(msg.senderUsername);

    const div = document.createElement('div');
    div.className = 'msg-group';
    div.innerHTML = `
      <div class="msg-avatar" style="background:${color}">${initials}</div>
      <div class="msg-body">
        <div class="msg-header">
          <span class="msg-sender">${escHtml(msg.senderUsername)}</span>
          <span class="msg-time">${time}</span>
        </div>
        <div class="msg-content">${escHtml(msg.content)}</div>
      </div>`;
    container.appendChild(div);
    if (scroll) scrollToBottom();
  }

  function appendSystemMessage(text) {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg-group';
    div.innerHTML = `<div class="msg-body" style="padding-left:48px"><div class="msg-content system">— ${escHtml(text)}</div></div>`;
    container.appendChild(div);
    scrollToBottom();
  }

  // ── SignalR ───────────────────────────────────────────────────────────
  async function initSignalR() {
    connection = new signalR.HubConnectionBuilder()
      .withUrl('/hubs/chat', { accessTokenFactory: () => token })
      .withAutomaticReconnect()
      .build();

    connection.on('ReceiveMessage', (msg) => {
      if (currentRoom && msg.roomId === currentRoom.id) appendMessage(msg);
    });

    connection.on('UserJoined', (username) => {
      if (username !== currentUser.username) appendSystemMessage(`${username} joined the room`);
    });

    connection.on('UserLeft', (username) => appendSystemMessage(`${username} left the room`));

    connection.onreconnecting(() => updateConnDot(false));
    connection.onreconnected(() => {
      updateConnDot(true);
      if (currentRoom) connection.invoke('JoinRoom', currentRoom.id).catch(console.error);
    });
    connection.onclose(() => updateConnDot(false));

    try {
      await connection.start();
      updateConnDot(true);
    } catch (e) {
      console.error('SignalR connection failed:', e);
      updateConnDot(false);
    }
  }

  function updateConnDot(connected) {
    const dot = document.getElementById('conn-dot');
    if (dot) dot.className = 'connection-dot' + (connected ? '' : ' offline');
  }

  // ── Send Message ──────────────────────────────────────────────────────
  async function sendMessage() {
    const input = document.getElementById('msg-input');
    const content = input.value.trim();
    if (!content || !currentRoom || connection?.state !== 'Connected') return;

    input.value = '';
    input.style.height = 'auto';
    document.getElementById('send-btn').disabled = true;

    try {
      await connection.invoke('SendMessage', currentRoom.id, content);
    } catch (e) {
      console.error('Failed to send:', e);
    } finally {
      document.getElementById('send-btn').disabled = false;
      input.focus();
    }
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  // ── New Room Modal ────────────────────────────────────────────────────
  function openNewRoomModal() { document.getElementById('new-room-modal').classList.add('open'); setTimeout(() => document.getElementById('new-room-name').focus(), 100); }
  function closeNewRoomModal() { document.getElementById('new-room-modal').classList.remove('open'); }

  async function createRoom() {
    const name = document.getElementById('new-room-name').value.trim();
    const description = document.getElementById('new-room-desc-input').value.trim();
    if (!name) return;
    try {
      const res = await fetch(`${BASE}/api/rooms`, {
        method: 'POST', headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
        body: JSON.stringify({ name, description })
      });
      if (res.ok) {
        const room = await res.json();
        rooms.push(room);
        renderRoomList();
        closeNewRoomModal();
        document.getElementById('new-room-name').value = '';
        document.getElementById('new-room-desc-input').value = '';
        joinRoom(room.id);
      }
    } catch { console.error('Failed to create room'); }
  }

  // ── Helpers ───────────────────────────────────────────────────────────
  function scrollToBottom() {
    const c = document.getElementById('messages');
    c.scrollTop = c.scrollHeight;
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function stringToColor(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
    const h = hash % 360;
    return `hsl(${Math.abs(h)}, 60%, 45%)`;
  }

  // Enter key on auth forms
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      if (document.getElementById('form-login').style.display !== 'none') doLogin();
      else doRegister();
    }
  });
</script>
</body>
